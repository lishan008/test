<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ninja Page</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center; /* horizontal center */
            align-items: center;     /* vertical center */
            background-color: #111;
        }

        .container {
            display: flex;
            flex-direction: column; /* stack items vertically */
            align-items: center;
        }

        img {
            max-width: 80%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        h1 {
            color: white;
            margin-top: 20px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.vectorstock.com/royalty-free-vector/stealthy-ninja-warrior-vector-59322959" alt="Ninja Image">
    <h1>Hello Rahul</h1>
</div>

</body>
</html>
